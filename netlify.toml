[build]
  command = "hugo"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.122.0"
  NODE_VERSION = "20.2.0"  # Add this line to specify the Node.js version

[[headers]]
  for = "/*"
    [headers.values]
      X-Frame-Options = "DENY"
      X-XSS-Protection = "1; mode=block"
      Access-Control-Allow-Origin = "https://sysadmin.info.pl"
      Content-Security-Policy = "default-src 'self'; base-uri 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com/; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval'; img-src 'self' https://buycoffee.to data:; font-src 'self' data:; connect-src 'self'; frame-src https://utteranc.es https://www.youtube.com https://asciinema.org; child-src https://youtube.com"
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, s-max-age=604800"
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, s-max-age=604800"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, s-max-age=604800"

