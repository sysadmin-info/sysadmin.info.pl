[build]
  command = "hugo"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.111.3"

[[headers]]
  for = "/*"
    [headers.values]
      Access-Control-Allow-Origin = "sysadmin.info.pl"
      Content-Security-Policy = "default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data; font-src 'self'; manifest-src https://sysadmin.info.pl/;"
