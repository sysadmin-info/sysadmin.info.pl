[build]
  command = "hugo"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.122.0"
  NODE_VERSION = "20.2.0"

[[headers]]
  for = "/*"
    [headers.values]
      X-Frame-Options = "DENY"
      X-XSS-Protection = "1; mode=block"
      Access-Control-Allow-Origin = "*"
      Content-Security-Policy = "default-src 'self'; base-uri 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://cdnjs.cloudflare.com https://utteranc.es https://www.google-analytics.com https://www.youtube.com 'unsafe-inline' 'unsafe-eval'; img-src 'self' https://buycoffee.to https://*.doubleclick.net https://cdn.buymeacoffee.com https://i.ytimg.com https://static.doubleclick.net https://googleads.g.doubleclick.net data:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://www.google-analytics.com https://googleads.g.doubleclick.net; frame-src https://utteranc.es https://www.youtube.com https://asciinema.org https://googleads.g.doubleclick.net; child-src https://youtube.com; media-src 'self'; object-src 'none';"
      Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, s-max-age=604800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, s-max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, s-max-age=604800"
