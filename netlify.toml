[build]
  command = "hugo"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.111.3"

[[headers]]
  for = "/*"
    [headers.values]
      Access-Control-Allow-Origin = "sysadmin.info.pl"
      Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' script-src 'none';"
